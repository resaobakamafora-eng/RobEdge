workflows:
  android-apk:
    name: RobEdge Android APK
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 20
      vars:
        PACKAGE_NAME: "io.robedge.app"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android
      - name: Build debug APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - resaobakamafora@gmail.com
        notify:
          success: true
          failure: true
